<footer
  class="mx-auto flex h-[4.5rem] max-w-(--w) items-center px-8 text-xs tracking-wider uppercase opacity-60"
>
  <div class="mr-auto">
    {{- if site.Copyright -}} {{- site.Copyright -}} {{- else -}} &copy; {{-
    now.Year }}
    <a class="link" href="{{- `` | absURL -}}">{{- site.Title -}}</a>
    {{- end -}}
  </div>
  <a class="link mx-6" href="https://gohugo.io/" rel="noopener" target="_blank"
    >powered by hugo️️</a
  >️
  <a
    class="link"
    href="https://github.com/nanxiaobei/hugo-paper"
    rel="noopener"
    target="_blank"
    >hugo-paper</a
  >
  <script>
      window.addEventListener('DOMContentLoaded', () => {

    gsap.registerPlugin(SplitText);
    let split = SplitText.create("#site-title", { type: "chars" });
    gsap.from(split.chars, {
      yPercent: "random([-100, 100])",
      rotation: "random([-30, 30])",
      autoAlpha: 0,
      duration: 1,
      yoyo: true,
      ease: "back.out",
      stagger: {
        amount: 0.5,
        from: "random"
      }
   })
      });
  </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14/dist/SplitText.min.js"></script>
</footer>
